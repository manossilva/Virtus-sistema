<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtus - Gestão de Obras</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: { 'spin-slow': 'spin 3s linear infinite' }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Animações Customizadas baseadas no Tailwind-animate do React */
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .animate-zoom-in { animation: zoomIn 0.3s ease-out; }
        .animate-slide-in-top { animation: slideInTop 0.3s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInTop { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilização Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Ocultar elementos para lógica de abas */
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="bg-[#F5F5F7] font-sans text-slate-800 overflow-hidden h-screen flex">

    <div id="root" class="w-full h-full flex"></div>

    <script>
        // --- DADOS SIMULADOS (MOCK DATA) ---
        const PHASES = [
            "Doc pessoais", "Análise de crédito", "Entrevista com gerente", "Contratos Virtus",
            "Alteração CAD. Imob", "Projetos e RRT", "Alvará de construção", "Taxa de engenharia",
            "Avaliação da engenharia", "Assinatura do contrato de financiamento", "Guias de ITBI",
            "ITBI", "Registro do contrato", "Liberação de Terreno", "Liberação de custas cartorárias",
            "CNO", "SCPO", "Medição 30%", "Aferição", "Medição de 60%", "Habite-se",
            "CND RFB", "Averbação", "Medição 100%", "Liberação de 5%"
        ];

        const ROLES = ['CEO', 'Financeiro', 'Arquiteto', 'Marketing', 'Atendente', 'Cliente'];
        const TEAM_USERS = ['Ana (Arquiteta)', 'Carlos (Financeiro)', 'Mariana (Marketing)', 'João (CEO)', 'Pedro (Atendente)'];

        // --- ESTADO GLOBAL DA APLICAÇÃO ---
        const state = {
            isAuthenticated: false,
            currentRole: 'CEO',
            currentView: 'dashboard',
            notificationsOpen: false,
            
            clients: [
                { id: 1, nome: 'João da Silva', telefone: '(11) 99999-9999', endereco: 'Rua das Flores, 123', phaseIndex: 8, comments: ['Fundações concluídas com sucesso.'] }
            ],
            financeEntries: [
                { id: 1, desc: 'Sinal - João da Silva', tipo: 'Entrada', valor: 45000, imposto: 2700, vencimento: '2026-02-10', status: 'Pago' },
                { id: 2, desc: 'Concreto Usinado', tipo: 'Saída', valor: 12300, imposto: 0, vencimento: '2026-02-20', status: 'Em Atraso' },
                { id: 3, desc: 'Folha de Pagamento - Equipe 1', tipo: 'Funcionário', valor: 8000, imposto: 0, vencimento: '2026-02-28', status: 'Pendente' },
            ],
            tasks: [
                { id: 't1', title: 'Aprovar projeto elétrico', column: 'todo', role: 'Arquiteto', days: 2, clientId: 1, assignees: ['Ana (Arquiteta)'], comments: [{ author: 'CEO', text: 'Prioridade alta neste projeto.', date: 'Hoje, 09:00' }] },
                { id: 't2', title: 'Pagamento fornecedor Cimento', column: 'in_progress', role: 'Financeiro', days: 5, clientId: 'internal', assignees: ['Carlos (Financeiro)'], comments: [] },
                { id: 't3', title: 'Campanha Instagram Mês 05', column: 'review', role: 'Marketing', days: 12, clientId: 'internal', assignees: [], comments: [] },
                { id: 't4', title: 'Assinatura Contrato', column: 'done', role: 'Atendente', days: 1, clientId: 1, assignees: ['Pedro (Atendente)'], comments: [] }
            ],
            notes: [
                { id: 1, date: '2026-02-18', text: 'Revisar contratos da obra 12 com o departamento jurídico.' },
                { id: 2, date: '2026-02-20', text: 'Cobrar equipe de marketing sobre a campanha de maio.' }
            ],
            events: [
                { id: 1, title: 'Reunião Cliente Alpha', date: '2026-02-25', time: '10:00', assignee: 'João (CEO)', type: 'emerald' }
            ],

            // Estados de Interface (UI)
            draggedTaskId: null,
            selectedTask: null,
            isNewTaskModalOpen: false,
            newTaskAssignees: [],
            newTaskRole: 'Arquiteto',
            
            isFinanceModalOpen: false,
            financeFilter: 'Todos',
            newFinanceTipo: 'Entrada',

            isEventModalOpen: false,
            
            portalClientId: 1,
            activeObraClient: null,
            hasDependentesForm: false
        };

        // --- SISTEMA DE RENDERIZAÇÃO E ROTAS ---
        function getNavItems() {
            const items = [];
            if (state.currentRole !== 'Cliente') {
                items.push({ id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' });
                items.push({ id: 'kanban', icon: 'kanban-square', label: 'Kanban Demandas' });
                items.push({ id: 'obras', icon: 'layout-dashboard', label: 'Acompanhamento de Obras' });
            }
            if (state.currentRole === 'CEO' || state.currentRole === 'Financeiro') {
                items.push({ id: 'finance', icon: 'wallet', label: 'Financeiro' });
            }
            if (state.currentRole === 'CEO') {
                items.push({ id: 'agenda', icon: 'calendar-days', label: 'Agenda & Notas' });
            }
            if (state.currentRole === 'Atendente' || state.currentRole === 'CEO') {
                items.push({ id: 'new_client', icon: 'user-plus', label: 'Cadastro Cliente' });
            }
            if (state.currentRole === 'Cliente' || state.currentRole === 'CEO') {
                items.push({ id: 'portal', icon: 'file-text', label: 'Portal do Cliente' });
            }
            return items;
        }

        function formatCurrency(val) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
        }

        // --- FUNÇÕES DE AÇÃO GLOBAIS (window) ---
        window.login = (e) => {
            e.preventDefault();
            state.currentRole = document.getElementById('loginRole').value;
            state.isAuthenticated = true;
            
            const nav = getNavItems();
            if(!nav.find(i => i.id === state.currentView)) state.currentView = nav[0].id;
            
            render();
        };

        window.logout = () => {
            state.isAuthenticated = false;
            render();
        };

        window.changeRole = (newRole) => {
            state.currentRole = newRole;
            const nav = getNavItems();
            if(!nav.find(i => i.id === state.currentView)) state.currentView = nav[0].id;
            render();
        };

        window.changeView = (viewId) => {
            state.currentView = viewId;
            render();
        };

        window.toggleNotifications = () => {
            state.notificationsOpen = !state.notificationsOpen;
            render();
        };

        // KANBAN ACTIONS
        window.dragStart = (e, id) => {
            state.draggedTaskId = id;
            e.dataTransfer.effectAllowed = "move";
            setTimeout(() => e.target.style.opacity = "0.5", 0);
        };
        window.dragEnd = (e) => {
            e.target.style.opacity = "1";
            state.draggedTaskId = null;
        };
        window.dragOver = (e) => e.preventDefault();
        window.drop = (e, columnId) => {
            e.preventDefault();
            if (state.draggedTaskId) {
                const task = state.tasks.find(t => t.id === state.draggedTaskId);
                if (task) task.column = columnId;
                render();
            }
        };
        window.openTask = (id) => {
            state.selectedTask = state.tasks.find(t => t.id === id);
            render();
        };
        window.closeTask = () => {
            state.selectedTask = null;
            render();
        };
        window.toggleNewTaskModal = (isOpen) => {
            state.isNewTaskModalOpen = isOpen;
            if(!isOpen) state.newTaskAssignees = [];
            render();
        };
        window.addTaskAssignee = (val) => {
            if(val && !state.newTaskAssignees.includes(val)) state.newTaskAssignees.push(val);
            render();
        };
        window.removeTaskAssignee = (val) => {
            state.newTaskAssignees = state.newTaskAssignees.filter(a => a !== val);
            render();
        };
        window.handleCreateTask = (e) => {
            e.preventDefault();
            const title = document.getElementById('newTaskTitle').value;
            const role = document.getElementById('newTaskRole').value;
            const days = document.getElementById('newTaskDays').value;
            
            state.tasks.push({
                id: Date.now().toString(),
                title: title, column: 'todo', role: role, days: Number(days),
                clientId: 'internal', assignees: [...state.newTaskAssignees], comments: []
            });
            window.toggleNewTaskModal(false);
        };
        window.updateTaskDays = (days) => {
            if(state.selectedTask) state.selectedTask.days = Number(days);
        };
        window.updateTaskClient = (clientId) => {
            if(state.selectedTask) state.selectedTask.clientId = clientId === 'internal' ? 'internal' : Number(clientId);
        };
        window.addTaskAssigneeExisting = (val) => {
            if(val && state.selectedTask && !(state.selectedTask.assignees || []).includes(val)) {
                state.selectedTask.assignees = state.selectedTask.assignees || [];
                state.selectedTask.assignees.push(val);
                render();
            }
        };
        window.removeTaskAssigneeExisting = (val) => {
            if(state.selectedTask) {
                state.selectedTask.assignees = state.selectedTask.assignees.filter(a => a !== val);
                render();
            }
        };
        window.addComment = (e) => {
            e.preventDefault();
            const input = document.getElementById('taskCommentInput');
            if(!input.value) return;
            state.selectedTask.comments = state.selectedTask.comments || [];
            state.selectedTask.comments.push({ 
                author: state.currentRole, text: input.value, 
                date: new Date().toLocaleString('pt-BR', { hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' }) 
            });
            input.value = '';
            render();
        };

        // FINANCE ACTIONS
        window.setFinanceFilter = (filter) => {
            state.financeFilter = filter;
            render();
        };
        window.toggleFinanceModal = (isOpen) => {
            state.isFinanceModalOpen = isOpen;
            if(isOpen) state.newFinanceTipo = 'Entrada';
            render();
        };
        window.setFinanceTipo = (tipo) => {
            state.newFinanceTipo = tipo;
            render();
        };
        window.handleAddEntry = (e) => {
            e.preventDefault();
            const desc = document.getElementById('finDesc').value;
            const valor = document.getElementById('finValor').value;
            const venc = document.getElementById('finVenc').value;
            const status = document.getElementById('finStatus').value;
            const impostoInput = document.getElementById('finImposto');
            const imposto = state.newFinanceTipo === 'Entrada' && impostoInput ? Number(impostoInput.value) : 0;

            state.financeEntries.push({
                id: Date.now(), desc: desc, tipo: state.newFinanceTipo, valor: Number(valor), imposto: imposto, vencimento: venc, status: status
            });
            window.toggleFinanceModal(false);
        };

        // AGENDA ACTIONS
        window.toggleEventModal = (isOpen) => {
            state.isEventModalOpen = isOpen;
            render();
        };
        window.addNote = (e) => {
            e.preventDefault();
            const input = document.getElementById('newNoteInput');
            if(!input.value.trim()) return;
            state.notes.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], text: input.value });
            render();
        };
        window.addEvent = (e) => {
            e.preventDefault();
            state.events.push({
                id: Date.now(), type: 'blue',
                title: document.getElementById('evTitle').value,
                date: document.getElementById('evDate').value,
                time: document.getElementById('evTime').value,
                assignee: document.getElementById('evAssignee').value
            });
            window.toggleEventModal(false);
        };

        // CLIENT FORM ACTIONS
        window.toggleDependentes = (isChecked) => {
            state.hasDependentesForm = isChecked;
            render(); // Redraws to show/hide the fields
        };
        window.handleGeneratePDF = (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGerarPdf');
            btn.innerHTML = '<i data-lucide="clock" class="animate-spin inline mr-2"></i> Processando PDF...';
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            lucide.createIcons();

            const nome = document.getElementById('cliNome').value;
            const tel = document.getElementById('cliTel').value;
            const end = document.getElementById('cliEnd').value;
            const ocu = document.getElementById('cliOcu').value;
            const sal = document.getElementById('cliSal').value;
            const tipoRenda = document.getElementById('cliTipoRenda').value;
            
            let depHtml = 'Cliente não possui dependentes.';
            if(state.hasDependentesForm) {
                const depNome = document.getElementById('cliDepNome').value;
                const depPar = document.getElementById('cliDepPar').value;
                depHtml = `Dependente: ${depNome} (${depPar})`;
            }

            const printContent = `
            <html>
                <head><title>Ficha_Cliente_${nome.replace(/\s+/g, '_')}</title><style>body { font-family: Arial, sans-serif; padding: 40px; color: #333; } .header { border-bottom: 2px solid #10b981; padding-bottom: 20px; margin-bottom: 30px; } h1 { color: #10b981; margin: 0; } .section { margin-bottom: 25px; } h2 { color: #333; font-size: 18px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; } .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; } .label { font-weight: bold; color: #666; font-size: 11px; text-transform: uppercase; } .value { font-size: 14px; margin-top: 4px; }</style></head>
                <body>
                <div class="header"><h1>Ficha de Cadastro - Virtus</h1><p style="color: #666; font-size: 14px;">Data de Emissão: ${new Date().toLocaleDateString()}</p></div>
                <div class="section"><h2>1. Dados Pessoais</h2><div class="grid"><div><div class="label">Nome Completo</div><div class="value">${nome}</div></div><div><div class="label">Telefone / WhatsApp</div><div class="value">${tel}</div></div><div style="grid-column: 1 / -1;"><div class="label">Endereço</div><div class="value">${end}</div></div></div></div>
                <div class="section"><h2>2. Perfil Financeiro</h2><div class="grid"><div><div class="label">Ocupação Principal</div><div class="value">${ocu || 'Não informado'}</div></div><div><div class="label">Renda Mensal</div><div class="value">${sal || 'Não informado'}</div></div><div><div class="label">Tipo de Renda</div><div class="value">${tipoRenda}</div></div></div></div>
                <div class="section"><h2>3. Composição Familiar</h2><div class="value">${depHtml}</div></div>
                <div style="margin-top: 50px; text-align: center; color: #999; font-size: 12px;">Este documento foi gerado digitalmente pelo Sistema Virtus.</div>
                </body>
            </html>
            `;

            state.clients.push({ id: Date.now(), nome: nome, telefone: tel, endereco: end, phaseIndex: 0, comments: ['Cadastro inicial recebido, documentação em análise.'] });

            setTimeout(() => {
                const printWindow = window.open('', '', 'width=800,height=600');
                if(printWindow) { printWindow.document.write(printContent); printWindow.document.close(); printWindow.focus(); printWindow.print(); }
                // Reset form
                state.hasDependentesForm = false;
                render();
            }, 800);
        };

        // PORTAL & OBRAS ACTIONS
        window.setPortalClient = (id) => { state.portalClientId = Number(id); render(); };
        window.updateObraPhase = (id, phaseIdx) => {
            const client = state.clients.find(c => c.id === id);
            if(client) client.phaseIndex = parseInt(phaseIdx);
            render();
        };
        window.toggleActiveObra = (id) => {
            state.activeObraClient = state.activeObraClient === id ? null : id;
            render();
        };
        window.addObraComment = (e, id) => {
            e.preventDefault();
            const input = document.getElementById('obraComment_' + id);
            if(!input.value) return;
            const client = state.clients.find(c => c.id === id);
            client.comments = client.comments || [];
            client.comments.push(input.value);
            state.activeObraClient = null;
            render();
        };

        // --- RENDERIZADORES DE VIEWS ---

        function renderLogin() {
            return `
            <div class="w-full min-h-screen bg-slate-50 flex items-center justify-center relative overflow-hidden">
                <div class="absolute -top-40 -right-40 w-96 h-96 bg-emerald-400/20 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-blue-400/20 rounded-full blur-3xl"></div>
                
                <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-slate-100 rounded-3xl shadow-2xl p-8 relative z-10 animate-zoom-in">
                    <div class="text-center mb-10">
                        <div class="w-16 h-16 rounded-2xl bg-emerald-500 flex items-center justify-center text-white font-bold text-3xl shadow-lg shadow-emerald-500/30 mx-auto mb-4">V</div>
                        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Virtus</h1>
                        <p class="text-slate-500 text-sm mt-1">Sistema Integrado de Gestão de Obras</p>
                    </div>

                    <form class="space-y-5" onsubmit="window.login(event)">
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">E-mail corporativo</label>
                            <div class="relative">
                                <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                                <input type="email" value="usuario@virtus.com.br" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all" required />
                            </div>
                        </div>
                        
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Senha</label>
                            <div class="relative">
                                <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                                <input type="password" value="******" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all" required />
                            </div>
                        </div>

                        <div class="space-y-1 pt-2">
                            <label class="text-xs font-semibold text-emerald-600 uppercase tracking-wider">Simular Acesso Como:</label>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 text-emerald-500 w-4 h-4"></i>
                                <select id="loginRole" class="w-full bg-emerald-50/50 border border-emerald-200 text-emerald-900 font-medium rounded-xl pl-10 pr-4 py-3 text-sm outline-none focus:ring-2 focus:ring-emerald-500/30 transition-all cursor-pointer">
                                    ${ROLES.map(r => `<option value="${r}" ${r===state.currentRole?'selected':''}>${r}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white rounded-xl py-3.5 text-sm font-semibold shadow-lg transition-all flex items-center justify-center gap-2 mt-6 group">
                            Entrar no Sistema <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                        </button>
                    </form>
                </div>
            </div>`;
        }

        function renderDashboard() {
            const stats = [
                { title: 'Obras em Andamento', value: '12', trend: '+2 esse mês', color: 'bg-emerald-500' },
                { title: 'Demandas Pendentes', value: '34', trend: '5 em atraso', color: 'bg-amber-500' },
                { title: 'Faturamento Estimado', value: 'R$ 450k', trend: 'Alinhado com a meta', color: 'bg-blue-500' },
                { title: 'Tempo Médio Entrega', value: '4.2 Dias', trend: 'SLA dentro da meta', color: 'bg-indigo-500' }
            ];

            return `
            <div class="max-w-6xl mx-auto space-y-8 animate-fade-in">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Visão Geral</h1>
                        <p class="text-slate-500 text-sm mt-1">Bem-vindo ao sistema de gestão Virtus.</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    ${stats.map(s => `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between h-40 relative overflow-hidden group">
                        <div class="relative z-10">
                            <p class="text-sm font-medium text-slate-500">${s.title}</p>
                            <h3 class="text-3xl font-bold mt-2 text-slate-900">${s.value}</h3>
                        </div>
                        <p class="text-xs text-slate-400 relative z-10">${s.trend}</p>
                        <div class="absolute -right-6 -bottom-6 w-24 h-24 rounded-full opacity-10 group-hover:scale-125 transition-transform duration-500 ${s.color}"></div>
                    </div>`).join('')}
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-96 flex items-center justify-center">
                    <div class="text-center">
                        <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-slate-100">
                            <i data-lucide="layout-dashboard" class="text-slate-300 w-6 h-6"></i>
                        </div>
                        <p class="text-slate-500 font-medium">Gráficos de Desempenho em breve</p>
                        <p class="text-sm text-slate-400 mt-1">A área de BI está sendo conectada ao banco de dados.</p>
                    </div>
                </div>
            </div>`;
        }

        function renderKanban() {
            const columns = [
                { id: 'todo', title: 'A Fazer' },
                { id: 'in_progress', title: 'Em Andamento' },
                { id: 'review', title: 'Validação' },
                { id: 'done', title: 'Concluído' }
            ];

            let kanbanHtml = `
            <div class="h-full flex flex-col space-y-6 animate-fade-in">
                <div class="flex justify-between items-end">
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Kanban de Demandas</h1>
                        <p class="text-slate-500 text-sm mt-1">Demandas do seu setor (<strong class="text-emerald-600">${state.currentRole}</strong>) estão destacadas.</p>
                    </div>
                    <button onclick="window.toggleNewTaskModal(true)" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all shadow-sm flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> Nova Demanda
                    </button>
                </div>
                <div class="flex-1 flex gap-6 overflow-x-auto pb-4">`;

            columns.forEach(col => {
                const colTasks = state.tasks.filter(t => t.column === col.id);
                kanbanHtml += `
                    <div class="flex-shrink-0 w-80 bg-slate-100/50 rounded-2xl p-4 flex flex-col border border-slate-200/50" ondragover="window.dragOver(event)" ondrop="window.drop(event, '${col.id}')">

                        </div>
                    </div>
                </header>
                <div class="flex-1 overflow-auto p-8 relative">
                    ${viewContent}
                </div>
            </main>`;
        }

        // --- FUNÇÃO PRINCIPAL DE INJEÇÃO DOM ---
        function render() {
            const root = document.getElementById('root');
            if (!state.isAuthenticated) {
                root.innerHTML = renderLogin();
            } else {
                root.innerHTML = renderAppLayout();
            }
            
            // Recriar ícones lucide sempre que o DOM for atualizado
            lucide.createIcons();
        }

        // Inicializar
        render();

    </script>
</body>
</html>
